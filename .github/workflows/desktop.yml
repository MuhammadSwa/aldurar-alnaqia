name: Build Desktop

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.0'
        # flutter-version-file: pubspec.yaml
        channel: 'stable'
        
    - name: Enable macOS desktop
      run: flutter config --enable-macos-desktop
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run tests
      run: flutter test
      
    - name: Build macOS
      run: flutter build macos --release
      
    - name: Create DMG
      run: |
        brew install create-dmg
        create-dmg \
          --volname "aldurar-alnaqia" \
          --window-pos 200 120 \
          --window-size 600 300 \
          --icon-size 100 \
          --app-drop-link 425 120 \
          "build/aldurar-alnaqia.dmg" \
          "build/macos/Build/Products/Release/aldurar-alnaqia.app" || true
        
    - name: Upload macOS App
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: build/macos/Build/Products/Release/
        
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: build/aldurar-alnaqia.dmg
      if: success()

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    - name: Enable Windows desktop
      run: flutter config --enable-windows-desktop
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run tests
      run: flutter test
      
    - name: Build Windows
      run: flutter build windows --release
      
    - name: Create Windows Installer
      run: |
        # Install NSIS for creating installer
        choco install nsis -y
        
        # Create a simple NSIS script
        echo 'OutFile "aldurar-alnaqia-Installer.exe"' > installer.nsi
        echo 'InstallDir "$PROGRAMFILES\aldurar-alnaqia"' >> installer.nsi
        echo 'Section "MainSection" SEC01' >> installer.nsi
        echo '  SetOutPath "$INSTDIR"' >> installer.nsi
        echo '  File /r "build\windows\x64\runner\Release\*"' >> installer.nsi
        echo '  CreateShortcut "$DESKTOP\aldurar-alnaqia.lnk" "$INSTDIR\your_app.exe"' >> installer.nsi
        echo 'SectionEnd' >> installer.nsi
        
        # Build installer
        makensis installer.nsi
      shell: cmd
      
    - name: Upload Windows Build
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: build/windows/x64/runner/Release/
        
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: aldurar-alnaqia-Installer.exe
      if: success()

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
        
    - name: Enable Linux desktop
      run: flutter config --enable-linux-desktop
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run tests
      run: flutter test
      
    - name: Build Linux
      run: flutter build linux --release
      
    - name: Create AppImage
      run: |
        # Install AppImage tools
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        
        # Create AppDir structure
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/lib
        
        # Copy application
        cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
        
        # Create desktop file
        cat > AppDir/aldurar-alnaqia.desktop << EOF
        [Desktop Entry]
        Type=Application
        Name=aldurar-alnaqia
        Exec=your_app
        Icon=app_icon
        Categories=Utility;
        EOF
        
        # Create AppImage
        ./appimagetool-x86_64.AppImage AppDir aldurar-alnaqia-x86_64.AppImage || true
        
    - name: Create TAR archive
      run: |
        cd build/linux/x64/release
        tar -czf ../../../../aldurar-alnaqia-linux.tar.gz bundle/
        
    - name: Upload Linux Build
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: build/linux/x64/release/bundle/
        
    - name: Upload Linux TAR
      uses: actions/upload-artifact@v4
      with:
        name: linux-tar
        path: aldurar-alnaqia-linux.tar.gz
        
    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: aldurar-alnaqia-x86_64.AppImage
      if: success()
